<!DOCTYPE html>
<html>
    <head>
        <title>Math Functions</title>
        <script src="AbsoluteFunction.js" defer></script>
    </head>
    <body>
        <h1>Absolute Function (Static)</h1>
        <label>Enter a value:</label>
        <input id="txtNumber" type="number" placeholder="Enter a value">
        <button id="btnAbsolute" onclick="onClickAbsoluteStatic()">Absolute</button>
        <p id="pAbsoluteStatic"></p>
        <h1>Absolute Function (Dynamic)</h1>
        <label>Enter a value:</label>
        <input id="txtNumber" type="number" placeholder="Enter a value">
        <button id="btnAbsolute" onclick="onClickAbsoluteDynamic()">Absolute</button>
        <p id="pAbsoluteDynamic"></p>

        
    </body>
</html>
